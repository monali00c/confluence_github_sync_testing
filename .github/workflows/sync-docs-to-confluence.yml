name: Sync Docs to Confluence

on:
  push:
    branches:
      - master
    paths:
      - 'docs/**/*.md'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no changes to Confluence)'
        required: false
        default: 'false'
        type: boolean

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests python-frontmatter markdown pygments

      - name: Get changed markdown files
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "CHANGED_FILES=all" >> $GITHUB_ENV
          else
            FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} -- 'docs/**/*.md' | tr '\n' ' ')
            echo "CHANGED_FILES=$FILES" >> $GITHUB_ENV
          fi

      - name: Sync docs to Confluence
        env:
          CONFLUENCE_URL: ${{ vars.CONFLUENCE_URL }}
          CONFLUENCE_SPACE_KEY: ${{ vars.CONFLUENCE_SPACE_KEY }}
          CONFLUENCE_ROOT_PAGE_ID: ${{ vars.CONFLUENCE_ROOT_PAGE_ID }}
          CONFLUENCE_EMAIL: ${{ secrets.CONFLUENCE_EMAIL }}
          CONFLUENCE_API_TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: python .github/scripts/sync_to_confluence.py
